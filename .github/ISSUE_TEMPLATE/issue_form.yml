name: Issue Report
description: Submit an issue report
title: "[Issue] "
labels: []
projects: []
body:
  - type: markdown
    attributes:
      value: |
        Thank you for submitting an issue! Please fill out the information below.

  - type: input
    id: title_input
    attributes:
      label: Title
      description: Brief summary of the issue
      placeholder: e.g., Login page fails to load
    validations:
      required: true

  - type: dropdown
    id: issue_type
    attributes:
      label: Issue Type
      description: Select the type of issue
      options:
        - BUG
        - Advancement
        - Security Vulnerability
        - Question
      default: 0
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Detailed description of the issue
      placeholder: |
        Please describe:
        1. What happened?
        2. What did you expect to happen?
        3. How to reproduce?
    validations:
      required: true

  - type: input
    id: akis_account
    attributes:
      label: AKIS Account and ID
      description: Optional - Provide your AKIS account and ID if relevant
      placeholder: e.g., username (ID: 12345)
    validations:
      required: false

  - type: textarea
    id: browser_logs
    attributes:
      label: Browser Logs
      description: Optional - If issue type is BUG, provide browser console logs (F12 → Console)
      placeholder: |
        Paste browser console logs here:
        - Error messages
        - Stack traces (if any)
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: Optional - Any other background information
      placeholder: |
        e.g.:
        - OS and version
        - Browser and version
        - Screenshot links
        - Was it working before?
    validations:
      required: false
