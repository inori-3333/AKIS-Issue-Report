name: Issue Report
description: Submit an issue report
title: "[Issue]: "
body:
  - type: markdown
    attributes:
      value: |
        Thank you for submitting an issue! Please fill out the information below.

  - type: input
    id: contact
    attributes:
      label: Title
      description: Brief summary of the issue
      placeholder: e.g., Login page fails to load
    validations:
      required: true

  - type: dropdown
    id: issue-type
    attributes:
      label: Issue Type
      description: Select the type of issue
      options:
        - BUG
        - Advancement
        - Security Vulnerability
        - Question
      default: 0
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Detailed description of the issue
      placeholder: |
        Please describe:
        1. What happened?
        2. What did you expect to happen?
        3. How to reproduce?
    validations:
      required: true

  - type: input
    id: akis-account
    attributes:
      label: AKIS Account and ID
      description: Optional - Provide your AKIS account and ID if relevant
      placeholder: e.g., username (ID: 12345)
    validations:
      required: false

  - type: textarea
    id: browser-logs
    attributes:
      label: Browser Logs
      description: Optional - If issue type is BUG, provide browser console logs (F12 → Console)
      placeholder: Paste browser console logs here
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Optional - Any other background information
      placeholder: e.g. OS, browser version, etc.
    validations:
      required: false
