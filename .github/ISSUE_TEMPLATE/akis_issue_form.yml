name: AKIS Issue Report
description: Report an issue for AKIS project
title: "[Issue] "
labels: []
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## Issue Report / 问题报告
        Please fill in the following information to help us resolve the issue faster.
        请填写以下信息以帮助我们更快地解决问题。

  - type: dropdown
    id: issue-type
    attributes:
      label: Issue Type / 问题类型
      description: Select the type of your issue / 选择问题类型
      options:
        - BUG
        - Advancement
        - Security Vulnerability
        - Question
      validations:
        required: true
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description / 问题描述
      description: Please describe the issue in detail / 请详细描述问题
      placeholder: |
        Steps to reproduce:
        1.
        2.
        3.

        Expected behavior:
        -

        Actual behavior:
        -
      render: markdown
    validations:
      required: true

  - type: input
    id: akis-account
    attributes:
      label: AKIS Account and ID (Optional) / AKIS账号和ID（可选）
      description: Your AKIS account username and ID if applicable / 您的AKIS账号用户名和ID（如适用）
      placeholder: "e.g., username / 用户名"
    validations:
      required: false

  - type: textarea
    id: browser-logs
    attributes:
      label: Browser Console Logs / 浏览器日志
      description: |
        Please provide browser console logs if the issue is related to a BUG.
        如果问题类型为BUG，请提供浏览器控制台日志。
      placeholder: |
        Console output:
        ...
      render: markdown
    validations:
      required: false
    validations:
      required: false
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context / 其他背景信息
      description: Any other background information that might be helpful / 任何其他可能有帮助的背景信息
      placeholder: |
        - OS: 
        - Browser: 
        - Version: 
        - ...
      render: markdown
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Terms / 条款
      options:
        - label: I have searched for similar issues / 我已搜索类似问题
          required: true
        - label: I understand this is a community-driven project / 我理解这是一个社区驱动的项目
          required: true
