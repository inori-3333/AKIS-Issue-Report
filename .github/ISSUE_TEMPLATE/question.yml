name: Question
description: 提交 AKIS 使用咨询或疑问
title: "[Question]: "
labels:
  - Question
  - triage
body:
  - type: textarea
    id: issue_description
    attributes:
      label: 问题描述
      description: 请描述你的疑问和当前观察到的行为。
      placeholder: 请填写详细的问题描述...
    validations:
      required: true

  - type: input
    id: akis_account
    attributes:
      label: AKIS账号和ID
      description: 可选，便于快速定位问题场景。
      placeholder: 例如：账号 xxx，ID 123456
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: 其他背景信息
      description: 可选，补充环境信息、截图、期望结果等。
      placeholder: 请填写其他相关背景信息...
    validations:
      required: false